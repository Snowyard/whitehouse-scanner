name: scan

on:
  schedule:
    - cron: '*/30 * * * *'   # every 30 minutes — fits the free private-repo minute budget
                              # (filings lag the trade by weeks, so this is plenty fast)
  workflow_dispatch:          # allows manual "Run workflow" button

concurrency:
  group: scan
  cancel-in-progress: false   # never kill a run mid-parse

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: node src/index.js
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
